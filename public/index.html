<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوت تصحيح الأوراق</title>
    <style>
        body { font-family: Arial; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px; }
        .container { max-width: 500px; background: white; border-radius: 24px; padding: 40px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        h1 { color: #1a1a2e; }
        .badge { display: inline-block; padding: 8px 20px; border-radius: 50px; margin: 5px; font-weight: bold; }
        .online { background: #10b981; color: white; }
        .offline { background: #ef4444; color: white; }
        .webhook { background: #1a1a2e; color: #10b981; padding: 15px; border-radius: 12px; font-family: monospace; margin: 20px 0; word-break: break-all; direction: ltr; }
        .btn { background: #667eea; color: white; border: none; padding: 12px 24px; border-radius: 50px; font-size: 1rem; cursor: pointer; margin: 5px; }
        .info { background: #f1f5f9; border-radius: 16px; padding: 20px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 بوت تصحيح الأوراق</h1>
        <p style="color: #64748b;">جاهز لاستقبال الصور من واتساب</p>
        
        <div class="info">
            <h3>📊 حالة الخدمات</h3>
            <div id="status">
                <span id="gemini" class="badge offline">🧠 فحص...</span>
                <span id="vision" class="badge offline">👁️ فحص...</span>
                <span id="wapilot" class="badge online">📱 جاهز</span>
            </div>
            <p id="msg" style="margin-top: 15px;"></p>
        </div>
        
        <div class="info">
            <h3>🔗 رابط Webhook</h3>
            <div class="webhook" id="url">جاري التحميل...</div>
            <button class="btn" onclick="copyUrl()">📋 نسخ</button>
        </div>
        
        <button class="btn" onclick="check()">🔄 تحديث</button>
        <p style="margin-top: 20px; color: #94a3b8; font-size: 0.8rem;">Instance: instance3532 | +20 119 383 101</p>
    </div>
    <script>
        const webhook = window.location.origin + '/api/webhook';
        document.getElementById('url').textContent = webhook;
        
        function copyUrl() {
            navigator.clipboard.writeText(webhook).then(() => alert('✅ تم النسخ!'));
        }
        
        async function check() {
            document.getElementById('gemini').className = 'badge offline';
            document.getElementById('gemini').textContent = '🧠 فحص...';
            document.getElementById('vision').className = 'badge offline';
            document.getElementById('vision').textContent = '👁️ فحص...';
            
            try {
                const r = await fetch(webhook);
                const data = await r.json();
                
                const gReady = data.gemini === 'ready';
                const vReady = data.vision === 'ready';
                const gKey = data.gemini_key === 'present';
                const vKey = data.vision_key === 'present';
                
                document.getElementById('gemini').className = gReady ? 'badge online' : 'badge offline';
                document.getElementById('gemini').textContent = gReady ? '🧠 ✅ متصل' : '🧠 ❌ غير متصل';
                
                document.getElementById('vision').className = vReady ? 'badge online' : 'badge offline';
                document.getElementById('vision').textContent = vReady ? '👁️ ✅ متصل' : '👁️ ❌ غير متصل';
                
                let msg = '';
                if (gReady && vReady) msg = '✅ جميع الخدمات تعمل!';
                else if (gKey && vKey) msg = '⚠️ المفاتيح موجودة لكن الخدمات غير مهيأة';
                else msg = '❌ تأكد من Environment Variables في Vercel';
                
                if (gKey) msg += ' | 🔑 Gemini ✓';
                if (vKey) msg += ' | 👁️ Vision ✓';
                
                document.getElementById('msg').textContent = msg;
            } catch(e) {
                document.getElementById('msg').textContent = '❌ خطأ في الاتصال';
            }
        }
        
        window.onload = check;
    </script>
</body>
</html>
